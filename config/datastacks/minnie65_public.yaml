# minnie65_public is a release datastack — only the published mat versions are
# meaningful to users; live mode would drift from what's officially released.
live_mode: false

# Cache namespace alias. minnie65_public describes the same underlying data
# as minnie65_phase3_v1 (filtered to the public-released materializations);
# the cache values for shared (mat_version, root_id, ...) tuples are
# identical, so we redirect cache reads/writes to the canonical namespace.
# This means:
#   - Warming minnie65_phase3_v1 also warms minnie65_public for free.
#   - The longlived-versions marker file lives at
#     gs://<bucket>/<prefix>info/minnie65_phase3_v1-longlived-versions.json
#     and serves both datastacks.
#   - Storage is one shared copy, not two.
# The CAVE call still uses minnie65_public — only the cache pathing changes.
cache_alias: minnie65_phase3_v1

# Cell-id lookup. Pattern lifted from ceesem/cortical-tools (microns_public.py):
# the lookup view maps cell_id (== row id in the nucleus table) to a stable
# supervoxel + root, and the main / alt tables answer the reverse direction
# for every persistent id in the dataset, including ones broken across edits.
cell_id_lookup:
  kind: view
  name: nucleus_detection_lookup_v1
root_id_lookup_main_table: nucleus_detection_v0
root_id_lookup_alt_tables:
  - nucleus_alternative_points

# Spatial config (transform, depth_range, layer_boundaries) AND synapse-table
# conventions (column projection, aggregation rules) for this datastack live
# in `config/aligned_volumes/minnie65_phase3.yaml` — keyed by aligned_volume
# rather than datastack so every proofreading version of the same volume
# (public release, internal v1, future versions) shares one coordinate system
# and one set of synapse columns. To override a synapse field for this
# specific datastack, drop a `synapse:` block here; field-level overrides
# inherit unspecified fields from the aligned_volume defaults.

# Periodic decoration-cache warming. Off by default (`enabled: false`).
# Each fire resolves "latest valid mat_version" against CAVE and writes the
# refreshed table into the SwrCache keyed by that version.
#
# In production set CDV_WARMUP_AUTH_TOKEN to a CAVE service token; locally
# CAVEclient falls back to ~/.cloudvolume/secrets/cave-secret.json.
#
# `startup_delay_seconds` matters in autoscaling deployments: when K8s spins
# up new pods the warmer should NOT immediately hit CAVE — wait a few minutes
# so a scaling burst doesn't multiplex into a thundering herd.
decoration_warmup:
  enabled: false
  tables:
    - aibs_metamodel_celltypes_v661
  warm_soma_table: true
  interval_seconds: 3600       # one hour
  startup_delay_seconds: 180   # three minutes

# Feature Explorer enablement. The embedding catalog (which parquets exist,
# their axes, feature columns, kNN defaults) lives in the manifest file
# referenced by `manifest_uri` — not inline here — so adding new feature data
# does not require a backend redeploy. The manifest is fetched with SWR
# semantics (soft TTL ~5 min) so edits propagate without a restart.
#
# Disabled by default. For local development point this at the manifest
# produced by `scripts/make_sample_embedding.py`. For production, point at
# a gs://... manifest file in the cache bucket.
feature_explorer:
  enabled: false
  cell_id_source_table: nucleus_detection_v0
  manifest_uri: "file:///tmp/cdv-embeddings/manifest.yaml"
